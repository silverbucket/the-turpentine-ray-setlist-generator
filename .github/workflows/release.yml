name: Release & Deploy

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: Bump version
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ inputs.bump }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build
        run: npm run build

      - name: Setup SSH for 5apps
        env:
          FIVEAPPS_DEPLOY_KEY: ${{ secrets.FIVEAPPS_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$FIVEAPPS_DEPLOY_KEY" > ~/.ssh/5apps_key
          chmod 600 ~/.ssh/5apps_key
          ssh-keyscan -H 5apps.com >> ~/.ssh/known_hosts
          echo -e "Host 5apps.com\n  IdentityFile ~/.ssh/5apps_key" >> ~/.ssh/config

      - name: Deploy to 5apps
        run: |
          git remote add 5apps git@5apps.com:silverbucket_setlist-roller.git 2>/dev/null || git remote set-url 5apps git@5apps.com:silverbucket_setlist-roller.git
          git add package.json dist -f
          git commit -m "deploy v${{ steps.version.outputs.version }}"
          git push 5apps HEAD:refs/heads/master --force

      - name: Tag and push version
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin HEAD:master --tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v${{ steps.version.outputs.version }}" --generate-notes
