<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Setlist Roller — a dice-powered setlist generator for bands who like to live dangerously."
    />
    <title>Setlist Roller</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <script>
      try {
        var p = localStorage.getItem("setlist-roller-theme") || "system";
        var e = p === "dark" ? "dark" : p === "light" ? "light"
          : window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.dataset.theme = e;
      } catch(x) {}
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
