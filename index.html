<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP — defense-in-depth for issue #79 (rs.js tokens live in localStorage).
      Inline-script hashes auto-filled at dev/build time; see
      vite-plugin-csp-hash.js. Edit the script body, refresh, no manual step.

      connect-src https: stays wide open — rs.js dials user-chosen remotes —
      so this does NOT block token exfiltration on its own. frame-ancestors,
      sandbox, and report-to are ignored in <meta> CSP; set them as HTTP
      headers at deploy.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' __CSP_SCRIPT_HASHES__; style-src 'self' 'unsafe-inline'; connect-src 'self' https:; img-src 'self' data:; font-src 'self'; manifest-src 'self' blob:; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"
    />
    <meta
      name="description"
      content="Setlist Roller — a dice-powered setlist generator for bands who like to live dangerously."
    />
    <title>Setlist Roller</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#e15b37" />
    <!-- SYNC: key + resolution logic duplicated from src/lib/theme.svelte.js to avoid FOITC. -->
    <script>
      try {
        var p = localStorage.getItem("setlist-roller-theme") || "system";
        var e = p === "dark" ? "dark" : p === "light" ? "light"
          : window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.dataset.theme = e;
      } catch(x) {}
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
